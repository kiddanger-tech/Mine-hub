<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login • MineHub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0b0e14;
      --card: #131a24;
      --card2: #1a2533;
      --border: #2a3a4a;
      --gold: #f7cb6b;
      --gold2: #fba980;
      --text: #e8edf5;
      --muted: #8899aa;
      --primary: #3dc46d;
      --primary-dark: #00a478;
      --danger: #ff4757;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-container { max-width: 400px; width: 100%; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p { color: var(--muted); font-size: 0.9rem; }
    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 2rem 1.5rem;
      border: 1px solid var(--border);
    }
    .card h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    .card .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .input-group input {
      width: 100%;
      padding: 0.9rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      font-size: 1rem;
    }
    .input-group input:focus { outline: none; border-color: var(--gold); }
    .btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff;
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--card2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .links { text-align: center; margin-top: 1.2rem; font-size: 0.9rem; color: var(--muted); }
    .links a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .links a:hover { text-decoration: underline; }
    .error-msg {
      color: var(--danger);
      font-size: 0.85rem;
      text-align: center;
      margin-top: 0.5rem;
      display: none;
    }
    .error-msg.show { display: block; }
    .divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider::before { margin-right: 1rem; }
    .divider::after { margin-left: 1rem; }
    .demo-credentials {
      background: var(--card2);
      border-radius: 12px;
      padding: 0.8rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
    .demo-credentials code {
      color: var(--gold);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>⛏️ MineHub</h1>
      <p>Invest • Mine • Earn Daily</p>
    </div>
    <div class="card">
      <h2>Welcome Back</h2>
      <div class="sub">Login to your mining dashboard</div>
      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" />
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" />
      </div>
      <div class="error-msg" id="loginError"></div>
      <button class="btn btn-primary" id="loginBtn"><i class="fas fa-arrow-right"></i> Login</button>
      <div class="divider">or</div>
      <button class="btn btn-secondary" id="guestBtn"><i class="fas fa-user"></i> Continue as Guest</button>
      <div class="links">Don't have an account? <a href="register.html">Register</a></div>
      <div class="demo-credentials">🔑 Demo: <code>demo@minehub.com</code> / <code>password123</code></div>
    </div>
  </div>

  <script>
    // ============================================================
    //  MALVRYX AI • LOGIN SYSTEM
    // ============================================================

    const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const emailInput = document.getElementById('loginEmail');
    const passwordInput = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const guestBtn = document.getElementById('guestBtn');
    const errorMsg = document.getElementById('loginError');

    async function login(email, password) {
      errorMsg.classList.remove('show');
      if (!email || !password) {
        errorMsg.textContent = 'Please enter both email and password.';
        errorMsg.classList.add('show');
        return;
      }
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email.trim(),
          password: password.trim()
        });
        if (error) {
          errorMsg.textContent = error.message;
          errorMsg.classList.add('show');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Login';
          return;
        }
        const { data: profile } = await supabase
          .from('profiles')
          .select('role')
          .eq('id', data.user.id)
          .single();
        if (profile?.role === 'admin') {
          window.location.href = '/admin/';
        } else {
          window.location.href = '/member/';
        }
      } catch (err) {
        errorMsg.textContent = 'An unexpected error occurred. Please try again.';
        errorMsg.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Login';
      }
    }

    loginBtn.addEventListener('click', () => {
      login(emailInput.value.trim(), passwordInput.value.trim());
    });
    passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginBtn.click(); });
    guestBtn.addEventListener('click', () => { login('demo@minehub.com', 'password123'); });

    async function checkExistingSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        const { data: profile } = await supabase
          .from('profiles')
          .select('role')
          .eq('id', session.user.id)
          .single();
        if (profile?.role === 'admin') {
          window.location.href = '/admin/';
        } else {
          window.location.href = '/member/';
        }
      }
    }
    checkExistingSession();
  </script>
</body>
</html>
