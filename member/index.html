<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard • MineHub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0b0e14;
      --card: #131a24;
      --card2: #1a2533;
      --border: #2a3a4a;
      --gold: #f7cb6b;
      --gold2: #fba980;
      --text: #e8edf5;
      --muted: #8899aa;
      --primary: #3dc46d;
      --danger: #ff4757;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .header {
      background: linear-gradient(135deg, #00a478, #3dc46d);
      padding: 1.5rem 1rem 2.5rem;
      text-align: center;
      position: relative;
    }
    .header h1 { font-size: 1.8rem; font-weight: 800; }
    .header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
    .header .logout-btn {
      position: absolute;
      right: 1rem;
      top: 1rem;
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .header .logout-btn:hover { background: rgba(255,255,255,0.3); }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 1rem;
      margin-top: -1.5rem;
      position: relative;
      z-index: 2;
    }
    .stat-card {
      background: var(--card);
      border-radius: 16px;
      padding: 1.2rem;
      text-align: center;
      border: 1px solid var(--border);
    }
    .stat-card .number {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-card .label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .section { padding: 1.5rem 1rem 0; }
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title i { color: var(--gold); }
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .product-card {
      background: var(--card);
      border-radius: 16px;
      padding: 1rem;
      border: 1px solid var(--border);
      transition: 0.3s;
      cursor: pointer;
      position: relative;
    }
    .product-card:active { transform: scale(0.97); }
    .product-card.locked { filter: grayscale(1); opacity: 0.6; }
    .product-card .badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--gold);
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .product-card .badge.locked-badge { background: var(--danger); color: #fff; }
    .product-card .product-img {
      width: 100%;
      border-radius: 12px;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: var(--card2);
    }
    .product-card .name { font-weight: 700; font-size: 0.95rem; margin-top: 8px; }
    .product-card .price { color: var(--gold); font-weight: 700; font-size: 1rem; }
    .product-card .detail {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 env(safe-area-inset-bottom);
      z-index: 100;
    }
    .bottom-nav a {
      color: var(--muted);
      text-align: center;
      text-decoration: none;
      font-size: 0.7rem;
      padding: 4px 12px;
      border-radius: 8px;
    }
    .bottom-nav a.active { color: var(--gold); }
    .bottom-nav a i { font-size: 1.4rem; display: block; margin-bottom: 2px; }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--card);
      border-radius: 24px;
      padding: 2rem 1.5rem;
      max-width: 400px;
      width: 100%;
      border: 1px solid var(--border);
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-box .modal-img {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      object-fit: cover;
      display: block;
      margin: 0 auto 1rem;
      background: var(--card2);
    }
    .modal-box .modal-title { font-size: 1.3rem; font-weight: 700; text-align: center; }
    .modal-box .modal-details { margin: 1rem 0; font-size: 0.9rem; color: var(--muted); }
    .modal-box .modal-details span { color: var(--text); font-weight: 600; }
    .modal-box .modal-details .gold { color: var(--gold); }
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 1.5rem;
    }
    .btn {
      padding: 0.8rem;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-cancel { background: var(--card2); color: var(--muted); }
    .btn-buy { background: linear-gradient(135deg, #00a478, #3dc46d); color: #fff; }
    .btn-buy:disabled { opacity: 0.5; cursor: not-allowed; }
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      z-index: 300;
      display: none;
      max-width: 90%;
      text-align: center;
      font-size: 0.9rem;
    }
    .toast.show { display: block; }
    .toast.success { border-color: var(--primary); }
    .toast.error { border-color: var(--danger); }

    .avatar-upload {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1rem 0;
    }
    .avatar-upload .preview {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--card2);
      border: 2px solid var(--gold);
    }
    .avatar-upload input[type="file"] { display: none; }
    .avatar-upload .upload-btn {
      padding: 0.6rem 1.2rem;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <h1>⛏️ MineHub</h1>
    <p>Invest • Mine • Earn Daily</p>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </header>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="number" id="statDevices">0</div>
      <div class="label">My Devices</div>
    </div>
    <div class="stat-card">
      <div class="number" id="statRevenue">GHS 0.00</div>
      <div class="label">Total Revenue</div>
    </div>
    <div class="stat-card">
      <div class="number" id="statBalance">GHS 0.00</div>
      <div class="label">Balance</div>
    </div>
    <div class="stat-card">
      <div class="number" id="statToday">GHS 0.00</div>
      <div class="label">Today's Earnings</div>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div class="section">
    <div class="section-title">
      <i class="fas fa-microchip"></i> Mining Rigs
    </div>
    <div class="product-grid" id="productGrid">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <img class="modal-img" id="modalImg" src="/images/placeholder.png" alt="Product">
      <div class="modal-title" id="modalTitle">Product Name</div>
      <div class="modal-details">
        <div>Price: <span class="gold" id="modalPrice">GHS 0</span></div>
        <div>Daily Income: <span class="gold" id="modalDaily">GHS 0</span></div>
        <div>Total Income: <span class="gold" id="modalTotal">GHS 0</span></div>
        <div>Validity: <span id="modalValidity">0 days</span></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" id="modalCancel">Cancel</button>
        <button class="btn btn-buy" id="modalBuy">Buy Now</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="index.html" class="active"><i class="fas fa-home"></i> Home</a>
    <a href="deposit.html"><i class="fas fa-wallet"></i> Deposit</a>
    <a href="withdraw.html"><i class="fas fa-hand-holding-usd"></i> Withdraw</a>
    <a href="profile.html"><i class="fas fa-user"></i> Mine</a>
  </nav>

  <script>
    // ============================================================
    //  MALVRYX AI • MINEHUB DASHBOARD WITH IMAGES
    // ============================================================

    const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let profile = null;
    let products = [];
    let userDevices = [];

    // ===== PLACEHOLDER IMAGES =====
    const PLACEHOLDERS = {
      miner: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiB2aWV3Qm94PSIwIDAgMTAwIDEwMCI+PHJlY3Qgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIGZpbGw9IiMxYTI1MzMiLz48dGV4dCB4PSI1MCIgeT0iNTUiIGZvbnQtc2l6ZT0iMTIiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiNmN2NiNmIiPvCfj6U8L3RleHQ+PC9zdmc+',
      avatar: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiB2aWV3Qm94PSIwIDAgMTAwIDEwMCI+PHJlY3Qgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIGZpbGw9IiMxYTI1MzMiLz48dGV4dCB4PSI1MCIgeT0iNTUiIGZvbnQtc2l6ZT0iMTIiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiNmN2NiNmIiPvCfjI48L3RleHQ+PC9zdmc+'
    };

    // ===== SESSION CHECK =====
    async function checkSession() {
      const { data: { session }, error } = await supabase.auth.getSession();
      if (error || !session) {
        window.location.href = '/login.html';
        return;
      }
      currentUser = session.user;
      await loadProfile();
      await loadProducts();
      await loadUserDevices();
      renderAll();
    }

    async function loadProfile() {
      const { data, error } = await supabase
        .from('profiles')
        .select('*')
        .eq('id', currentUser.id)
        .single();
      if (!error) profile = data;
    }

    async function loadProducts() {
      const { data, error } = await supabase
        .from('products')
        .select('*')
        .order('sort_order', { ascending: true });
      if (!error) products = data;
    }

    async function loadUserDevices() {
      const { data, error } = await supabase
        .from('user_devices')
        .select('*')
        .eq('user_id', currentUser.id)
        .eq('status', 'active');
      if (!error) userDevices = data;
    }

    // ===== RENDER =====
    function renderAll() {
      renderStats();
      renderProducts();
    }

    function renderStats() {
      const totalDevices = userDevices.length;
      const totalRevenue = userDevices.reduce((sum, d) => sum + (d.total_income || 0), 0);
      const balance = profile?.balance || 0;
      const todayEarnings = userDevices.reduce((sum, d) => sum + (d.daily_income || 0), 0);

      document.getElementById('statDevices').textContent = totalDevices;
      document.getElementById('statRevenue').textContent = 'GHS ' + totalRevenue.toFixed(2);
      document.getElementById('statBalance').textContent = 'GHS ' + balance.toFixed(2);
      document.getElementById('statToday').textContent = 'GHS ' + todayEarnings.toFixed(2);
    }

    function renderProducts() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      products.forEach(p => {
        // Use image from Supabase or fallback to placeholder
        const imgSrc = p.image_url && p.image_url.startsWith('http') 
          ? p.image_url 
          : '/images/' + (p.image_url || 'miner-default.png');

        const card = document.createElement('div');
        card.className = 'product-card' + (p.is_locked ? ' locked' : '');
        card.innerHTML = `
          <img class="product-img" src="${imgSrc}" alt="${p.name}" 
               onerror="this.src='${PLACEHOLDERS.miner}'" loading="lazy">
          ${p.is_locked ? '<div class="badge locked-badge">🔒 Locked</div>' : '<div class="badge">🔥 Hot</div>'}
          <div class="name">${p.name}</div>
          <div class="price">GHS ${p.price}</div>
          <div class="detail">
            <span>📈 GHS ${p.daily_income}/day</span>
            <span>📅 ${p.validity_days}d</span>
          </div>
        `;
        if (!p.is_locked) {
          card.addEventListener('click', () => openModal(p));
        }
        grid.appendChild(card);
      });
    }

    // ===== MODAL =====
    let selectedProduct = null;

    function openModal(product) {
      selectedProduct = product;
      const imgSrc = product.image_url && product.image_url.startsWith('http')
        ? product.image_url
        : '/images/' + (product.image_url || 'miner-default.png');

      document.getElementById('modalImg').src = imgSrc;
      document.getElementById('modalImg').onerror = function() {
        this.src = PLACEHOLDERS.miner;
      };
      document.getElementById('modalTitle').textContent = product.name;
      document.getElementById('modalPrice').textContent = 'GHS ' + product.price;
      document.getElementById('modalDaily').textContent = 'GHS ' + product.daily_income;
      document.getElementById('modalTotal').textContent = 'GHS ' + product.total_income;
      document.getElementById('modalValidity').textContent = product.validity_days + ' days';
      document.getElementById('modal').classList.add('show');
    }

    document.getElementById('modalCancel').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('show');
    });

    document.getElementById('modalBuy').addEventListener('click', async function() {
      if (!selectedProduct) return;
      const btn = this;
      btn.disabled = true;
      btn.textContent = 'Processing...';

      if ((profile?.balance || 0) < selectedProduct.price) {
        showToast('Insufficient balance. Please deposit first.', 'error');
        btn.disabled = false;
        btn.textContent = 'Buy Now';
        return;
      }

      const newBalance = (profile?.balance || 0) - selectedProduct.price;

      const { error: deviceError } = await supabase
        .from('user_devices')
        .insert({
          user_id: currentUser.id,
          product_id: selectedProduct.id,
          price: selectedProduct.price,
          daily_income: selectedProduct.daily_income,
          total_income: selectedProduct.total_income,
          validity_days: selectedProduct.validity_days,
          days_remaining: selectedProduct.validity_days,
          expires_at: new Date(Date.now() + selectedProduct.validity_days * 86400000).toISOString()
        });

      if (deviceError) {
        showToast('Purchase failed: ' + deviceError.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Buy Now';
        return;
      }

      await supabase
        .from('profiles')
        .update({ balance: newBalance })
        .eq('id', currentUser.id);

      await supabase
        .from('transactions')
        .insert({
          user_id: currentUser.id,
          type: 'purchase',
          amount: -selectedProduct.price,
          description: 'Purchased ' + selectedProduct.name,
          status: 'completed'
        });

      showToast('✅ Successfully purchased ' + selectedProduct.name + '!', 'success');
      document.getElementById('modal').classList.remove('show');
      btn.disabled = false;
      btn.textContent = 'Buy Now';

      await loadProfile();
      await loadUserDevices();
      renderAll();
    });

    // ===== TOAST =====
    function showToast(msg, type = 'info') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show ' + type;
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove('show'), 4000);
    }

    // ===== LOGOUT =====
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '/login.html';
    });

    // ===== INIT =====
    checkSession();
  </script>
</body>
</html>
