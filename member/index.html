<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard • MineHub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0b0e14;
      --card: #131a24;
      --card2: #1a2533;
      --border: #2a3a4a;
      --gold: #f7cb6b;
      --gold2: #fba980;
      --text: #e8edf5;
      --muted: #8899aa;
      --primary: #3dc46d;
      --danger: #ff4757;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .header {
      background: linear-gradient(135deg, #00a478, #3dc46d);
      padding: 1.5rem 1rem 2.5rem;
      text-align: center;
      position: relative;
    }
    .header h1 { font-size: 1.8rem; font-weight: 800; }
    .header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
    .header .logout-btn {
      position: absolute;
      right: 1rem;
      top: 1rem;
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .header .logout-btn:hover { background: rgba(255,255,255,0.3); }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 1rem;
      margin-top: -1.5rem;
      position: relative;
      z-index: 2;
    }
    .stat-card {
      background: var(--card);
      border-radius: 16px;
      padding: 1.2rem;
      text-align: center;
      border: 1px solid var(--border);
    }
    .stat-card .number {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-card .label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .section { padding: 1.5rem 1rem 0; }
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title i { color: var(--gold); }
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .product-card {
      background: var(--card);
      border-radius: 16px;
      padding: 1rem;
      border: 1px solid var(--border);
      transition: 0.3s;
      cursor: pointer;
      position: relative;
    }
    .product-card:active { transform: scale(0.97); }
    .product-card.locked { filter: grayscale(1); opacity: 0.6; }
    .product-card .badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--gold);
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .product-card .badge.locked-badge { background: var(--danger); color: #fff; }
    .product-card img {
      width: 100%;
      border-radius: 12px;
      aspect-ratio: 1/1;
      object-fit: cover;
      background: var(--card2);
    }
    .product-card .name { font-weight: 700; font-size: 0.95rem; margin-top: 8px; }
    .product-card .price { color: var(--gold); font-weight: 700; font-size: 1rem; }
    .product-card .detail {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 env(safe-area-inset-bottom);
      z-index: 100;
    }
    .bottom-nav a {
      color: var(--muted);
      text-align: center;
      text-decoration: none;
      font-size: 0.7rem;
      padding: 4px 12px;
      border-radius: 8px;
    }
    .bottom-nav a.active { color: var(--gold); }
    .bottom-nav a i { font-size: 1.4rem; display: block; margin-bottom: 2px; }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--card);
      border-radius: 24px;
      padding: 2rem 1.5rem;
      max-width: 400px;
      width: 100%;
      border: 1px solid var(--border);
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-box .modal-img {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      object-fit: cover;
      display: block;
      margin: 0 auto 1rem;
      background: var(--card2);
    }
    .modal-box .modal-title { font-size: 1.3rem; font-weight: 700; text-align: center; }
    .modal-box .modal-details { margin: 1rem 0; font-size: 0.9rem; color: var(--muted); }
    .modal-box .modal-details span { color: var(--text); font-weight: 600; }
    .modal-box .modal-details .gold { color: var(--gold); }
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 1.5rem;
    }
    .btn {
      padding: 0.8rem;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-cancel { background: var(--card2); color: var(--muted); }
    .btn-buy { background: linear-gradient(135deg, #00a478, #3dc46d); color: #fff; }
    .btn-buy:disabled { opacity: 0.5; cursor: not-allowed; }

      bottom: 80px;

      transform: translateX(-50%);
