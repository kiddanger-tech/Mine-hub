<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Register • MineHub</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0b0e14;
      --card: #131a24;
      --card2: #1a2533;
      --border: #2a3a4a;
      --gold: #f7cb6b;
      --gold2: #fba980;
      --text: #e8edf5;
      --muted: #8899aa;
      --primary: #3dc46d;
      --primary-dark: #00a478;
      --danger: #ff4757;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .register-container { max-width: 420px; width: 100%; }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p { color: var(--muted); font-size: 0.85rem; }
    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 2rem 1.5rem;
      border: 1px solid var(--border);
    }
    .card h2 { font-size: 1.3rem; margin-bottom: 0.3rem; }
    .card .sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .input-group { margin-bottom: 0.9rem; }
    .input-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .input-group input {
      width: 100%;
      padding: 0.9rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: var(--text);
      font-size: 1rem;
    }
    .input-group input:focus { outline: none; border-color: var(--gold); }
    .input-group .hint { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }
    .btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: #fff;
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .links { text-align: center; margin-top: 1.2rem; font-size: 0.9rem; color: var(--muted); }
    .links a { color: var(--gold); text-decoration: none; font-weight: 600; }
    .links a:hover { text-decoration: underline; }
    .error-msg {
      color: var(--danger);
      font-size: 0.85rem;
      text-align: center;
      margin-top: 0.5rem;
      display: none;
    }
    .error-msg.show { display: block; }
    .success-msg {
      color: var(--primary);
      font-size: 0.85rem;
      text-align: center;
      margin-top: 0.5rem;
      display: none;
    }
    .success-msg.show { display: block; }
    .bonus-badge {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #000;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 0.5rem;
    }
    .password-strength {
      height: 4px;
      border-radius: 4px;
      background: var(--border);
      margin-top: 6px;
      transition: 0.3s;
    }
    .password-strength .bar {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: 0.3s;
    }
    .password-strength .bar.weak { width: 25%; background: var(--danger); }
    .password-strength .bar.medium { width: 50%; background: #eab308; }
    .password-strength .bar.strong { width: 75%; background: var(--primary); }
    .password-strength .bar.very-strong { width: 100%; background: var(--primary); }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="logo">
      <h1>⛏️ MineHub</h1>
      <p>Start mining and earning today</p>
    </div>
    <div class="card">
      <div style="text-align:center;"><span class="bonus-badge">🎁 Get GHS 15 Bonus on Signup</span></div>
      <h2>Create Account</h2>
      <div class="sub">Join thousands of miners earning daily</div>
      <div class="input-group">
        <label><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="regName" placeholder="John Doe" />
      </div>
      <div class="input-group">
        <label><i class="fas fa-phone"></i> Phone Number</label>
        <input type="tel" id="regPhone" placeholder="233501234567" />
        <div class="hint">Enter without + sign (e.g., 233501234567)</div>
      </div>
      <div class="input-group">
        <label><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" id="regEmail" placeholder="you@example.com" />
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="regPassword" placeholder="Create a strong password" />
        <div class="password-strength"><div class="bar" id="passwordBar"></div></div>
        <div class="hint">Minimum 6 characters</div>
      </div>
      <div class="input-group">
        <label><i class="fas fa-user-plus"></i> Referral Code (Optional)</label>
        <input type="text" id="regRefCode" placeholder="Enter referral code" />
        <div class="hint">Get bonus from your referrer</div>
      </div>
      <div class="error-msg" id="regError"></div>
      <div class="success-msg" id="regSuccess"></div>
      <button class="btn btn-primary" id="registerBtn"><i class="fas fa-rocket"></i> Register Now</button>
      <div class="links">Already have an account? <a href="login.html">Login</a></div>
    </div>
  </div>

  <script>
    // ============================================================
    //  MALVRYX AI • REGISTRATION SYSTEM
    // ============================================================

    const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const nameInput = document.getElementById('regName');
    const phoneInput = document.getElementById('regPhone');
    const emailInput = document.getElementById('regEmail');
    const passwordInput = document.getElementById('regPassword');
    const refCodeInput = document.getElementById('regRefCode');
    const registerBtn = document.getElementById('registerBtn');
    const errorMsg = document.getElementById('regError');
    const successMsg = document.getElementById('regSuccess');
    const passwordBar = document.getElementById('passwordBar');

    // Password strength
    passwordInput.addEventListener('input', function() {
      const pwd = this.value;
      let strength = 0;
      if (pwd.length >= 6) strength++;
      if (pwd.length >= 10) strength++;
      if (/[A-Z]/.test(pwd)) strength++;
      if (/[0-9]/.test(pwd)) strength++;
      if (/[^A-Za-z0-9]/.test(pwd)) strength++;
      const levels = ['', 'weak', 'medium', 'strong', 'very-strong'];
      passwordBar.className = 'bar ' + levels[Math.min(strength, 4)];
    });

    async function register() {
      const name = nameInput.value.trim();
      const phone = phoneInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      const refCode = refCodeInput.value.trim();

      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');

      if (!name || !phone || !email || !password) {
        errorMsg.textContent = 'Please fill in all required fields.';
        errorMsg.classList.add('show');
        return;
      }
      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters.';
        errorMsg.classList.add('show');
        return;
      }
      if (!email.includes('@')) {
        errorMsg.textContent = 'Please enter a valid email address.';
        errorMsg.classList.add('show');
        return;
      }
      const phoneRegex = /^233[0-9]{9}$/;
      if (!phoneRegex.test(phone)) {
        errorMsg.textContent = 'Please enter a valid Ghana phone number (e.g., 233501234567)';
        errorMsg.classList.add('show');
        return;
      }

      registerBtn.disabled = true;
      registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

      try {
        let referrerGalaxyId = null;
        if (refCode) {
          const { data: referrer } = await supabase
            .from('profiles')
            .select('id, galaxy_id')
            .eq('galaxy_id', refCode.toUpperCase())
            .single();
          if (!referrer) {
            errorMsg.textContent = 'Invalid referral code. Please check and try again.';
            errorMsg.classList.add('show');
            registerBtn.disabled = false;
            registerBtn.innerHTML = '<i class="fas fa-rocket"></i> Register Now';
            return;
          }
          referrerGalaxyId = referrer.galaxy_id;
        }

        const { data: authData, error: authError } = await supabase.auth.signUp({
          email, password,
          options: { data: { full_name: name, phone: phone } }
        });

        if (authError) {
          errorMsg.textContent = authError.message;
          errorMsg.classList.add('show');
          registerBtn.disabled = false;
          registerBtn.innerHTML = '<i class="fas fa-rocket"></i> Register Now';
          return;
        }

        const userId = authData.user.id;
        const galaxyId = 'MH' + String(Date.now()).substring(4) + Math.random().toString(36).substring(2, 5).toUpperCase();

        await supabase.from('profiles').insert({
          id: userId,
          galaxy_id: galaxyId,
          full_name: name,
          phone: phone,
          email: email,
          balance: 15,
          referred_by: referrerGalaxyId,
          role: 'member',
          withdrawal_stage: 1
        });

        await supabase.from('transactions').insert({
          user_id: userId,
          type: 'signup_bonus',
          amount: 15,
          description: 'Welcome bonus on registration',
          status: 'completed'
        });

        await supabase.from('notifications').insert({
          user_id: userId,
          title: '🎉 Welcome to MineHub!',
          message: 'You received GHS 15 bonus. Start investing in mining rigs to earn daily income!',
          type: 'success'
        });

        if (referrerGalaxyId) {
          const { data: referrerData } = await supabase
            .from('profiles')
            .select('id, balance, referral_earnings')
            .eq('galaxy_id', referrerGalaxyId)
            .single();

          if (referrerData) {
            await supabase.from('referrals').insert({
              referrer_id: referrerData.id,
              referred_id: userId,
              commission: 1.5,
              status: 'completed'
            });
            await supabase.from('profiles').update({
              balance: (referrerData.balance || 0) + 1.5,
              referral_earnings: (referrerData.referral_earnings || 0) + 1.5
            }).eq('id', referrerData.id);
            await supabase.from('notifications').insert({
              user_id: referrerData.id,
              title: '🎁 Referral Bonus',
              message: `You earned GHS 1.50 from ${name}'s registration.`,
              type: 'success'
            });
          }
        }

        successMsg.textContent = '✅ Registration successful! Redirecting to dashboard...';
        successMsg.classList.add('show');

        await supabase.auth.signInWithPassword({ email, password });
        setTimeout(() => { window.location.href = '/member/'; }, 2000);

      } catch (err) {
        console.error(err);
        errorMsg.textContent = 'An unexpected error occurred. Please try again.';
        errorMsg.classList.add('show');
        registerBtn.disabled = false;
        registerBtn.innerHTML = '<i class="fas fa-rocket"></i> Register Now';
      }
    }

    registerBtn.addEventListener('click', register);
    passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') registerBtn.click(); });

    // Auto-fill referral from URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('ref')) refCodeInput.value = params.get('ref').toUpperCase();

    // Check if already logged in
    async function checkExistingSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) window.location.href = '/member/';
    }
    checkExistingSession();
  </script>
</body>
</html>
